name: Bug report
description: Something in BETON isn't working as documented
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report. Before filing, please check existing issues to avoid duplicates.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      placeholder: |
        1. Install BETON v0.5.x
        2. Edit a Python file in a project with ruff installed
        3. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: BETON version
      placeholder: "0.5.1"
    validations:
      required: true

  - type: input
    id: claude-code
    attributes:
      label: Claude Code version
      placeholder: "Output of: claude --version"

  - type: input
    id: os
    attributes:
      label: OS and shell
      placeholder: "macOS 14.5, zsh"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Output from the hook, contents of `~/.claude/.beton-state`, or test output.
      render: shell

  - type: checkboxes
    id: checked
    attributes:
      label: Quick checks
      options:
        - label: I ran `bash tests/test-*.sh` and recorded the result.
          required: false
        - label: I ran `/beton` to check which verifier tools are installed.
          required: false
